# Block MCP tool responses that carry hidden instructions for the model.
# Native Agent Control Specification manifest: the post_tool_call intervention
# point binds a host-owned custom policy that scans the tool result for
# instruction-injection markers and denies delivery when poisoned. This is the
# contract a customer would ship; no legacy policy language.
agent_control_specification_version: 0.3.1-beta
metadata:
  name: mcp-response-guard
policies:
  response_guard:
    type: custom
    adapter: e2e_rule
    config:
      rule:
        kind: content_scan
        markers:
          - "<important>"
          - "ignore all previous instructions"
        allow:
          reason: mcp.allow-clean-response
          message: MCP response is clean
        deny:
          reason: mcp.deny-poisoned-response
          message: Poisoned MCP response blocked before model inbox
intervention_points:
  post_tool_call:
    policy_target_kind: tool_result
    policy_target: "$.tool_result.content"
    tool_name_from: "$.tool_call.name"
    policy:
      id: response_guard
tools:
  get_weather:
    type: Tool
    id: get_weather
