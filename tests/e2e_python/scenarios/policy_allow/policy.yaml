# Allow non-diagnostic visit-note updates for clinic intake agents.
version: "1.0"
name: healthcare-governance
description: Clinic intake agents may append non-diagnostic visit notes.
defaults:
  action: allow
rules:
  - name: healthcare.allow-visit-note-update
    condition:
      field: tool_name
      operator: eq
      value: update_visit_notes
    action: allow
    message: Non-diagnostic visit note update allowed
    priority: 100
