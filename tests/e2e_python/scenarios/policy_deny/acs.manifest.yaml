# Deny out-of-scope live budget mutations for campaign optimization agents.
# Native Agent Control Specification manifest: the pre_tool_call intervention
# point binds a host-owned custom policy that denies the live budget mutation.
# This is the contract a customer would ship; no legacy policy language.
agent_control_specification_version: 0.3.1-beta
metadata:
  name: adtech-live-budget-guard
policies:
  tool_guard:
    type: custom
    adapter: e2e_rule
    config:
      rule:
        tool: increase_daily_budget
        decision: deny
        reason: adtech.deny-live-budget-mutation
        message: Live budget mutation is out-of-scope
intervention_points:
  pre_tool_call:
    policy_target_kind: tool_args
    policy_target: "$.tool_call.args"
    tool_name_from: "$.tool_call.name"
    policy:
      id: tool_guard
tools:
  increase_daily_budget:
    type: Tool
    id: increase_daily_budget
