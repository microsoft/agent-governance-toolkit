# Deny out-of-scope live budget mutations for campaign optimization agents.
version: "1.0"
name: adtech-governance
description: Campaign agents may read and recommend, but not mutate live spend.
defaults:
  action: allow
rules:
  - name: adtech.deny-live-budget-mutation
    condition:
      field: tool_name
      operator: eq
      value: increase_daily_budget
    action: deny
    message: Live budget mutation is out-of-scope
    priority: 100
