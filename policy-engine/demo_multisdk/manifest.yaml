agent_control_specification_version: "0.3.1-beta"
metadata:
  name: "multi-sdk-demo-agent"
  description: "Comprehensive manifest exercised by the Python, Node, .NET and Rust SDKs."
extends: []

policies:
  demo:
    type: rego
    bundle: ./policy
    query: data.acs.demo.verdict

intervention_points:
  agent_startup:
    policy_target: "$.agent"
    policy_target_kind: agent_metadata
    policy:
      id: demo
      query: data.acs.demo.agent_startup_verdict

  input:
    policy_target: "$.input"
    policy_target_kind: user_input
    policy:
      id: demo
      query: data.acs.demo.input_verdict

  pre_model_call:
    policy_target: "$.model_request"
    policy_target_kind: model_request
    policy:
      id: demo
      query: data.acs.demo.pre_model_call_verdict

  post_model_call:
    policy_target: "$.model_response"
    policy_target_kind: model_response
    policy:
      id: demo
      query: data.acs.demo.post_model_call_verdict

  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    policy:
      id: demo
      query: data.acs.demo.pre_tool_call_verdict

  post_tool_call:
    policy_target: "$.tool_result"
    policy_target_kind: tool_result
    tool_name_from: "$.tool_call.name"
    policy:
      id: demo
      query: data.acs.demo.post_tool_call_verdict

  output:
    policy_target: "$.output"
    policy_target_kind: assistant_output
    policy:
      id: demo
      query: data.acs.demo.output_verdict

  agent_shutdown:
    policy_target: "$.summary"
    policy_target_kind: shutdown_summary
    policy:
      id: demo
      query: data.acs.demo.agent_shutdown_verdict

tools:
  echo_tool:
    type: Tool
    id: echo_tool
    clearance: [demo]
    security_labels: [benign]
  payments_tool:
    type: Tool
    id: payments_tool
    clearance: [demo]
    security_labels: [sensitive]
  danger_tool:
    type: Tool
    id: danger_tool
    clearance: [demo]
    security_labels: [sensitive]

annotators: {}
