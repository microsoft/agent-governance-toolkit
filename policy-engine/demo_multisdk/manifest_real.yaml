agent_control_specification_version: "0.3.1-beta"
metadata:
  name: "real-azure-demo"
  description: "Real Azure Content Safety annotator gating a real Azure OpenAI model call."
extends: []

policies:
  cs:
    type: rego
    bundle: ./policy_real
    query: data.acs.real.verdict

intervention_points:
  input:
    policy_target: "$.input"
    policy_target_kind: user_input
    annotations:
      aacs:
        from: "$policy_target"
    policy:
      id: cs
      query: data.acs.real.input_verdict

  output:
    policy_target: "$.output"
    policy_target_kind: assistant_output
    annotations:
      aacs:
        from: "$policy_target"
    policy:
      id: cs
      query: data.acs.real.output_verdict

annotators:
  aacs:
    type: classifier
