agent_control_specification_version: "0.3.0-alpha"
metadata:
  name: "ifc-agent"
policies:
  ifc_policy:
    type: rego
    bundle: ./policy
    data_paths:
      # Point at the specific upstream IFC library file rather than
      # the whole policy/lib/ directory, because the AGT stock library
      # now ships sibling subdirectories (cedar/) and *_test.rego files
      # that OPA's data loader cannot reconcile with the Rego bundle.
      - ../../policy/lib/ifc.rego
    query: data.agent_control_specification.ifc_agent.verdict
intervention_points:
  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    policy:
      id: ifc_policy
      query: data.agent_control_specification.ifc_agent.pre_tool_call_verdict
tools:
  public_egress:
    type: Tool
    id: public_egress
    clearance: public
    security_labels: [external]
  trusted_archive:
    type: Tool
    id: trusted_archive
    clearance: confidential
    security_labels: [controlled]
