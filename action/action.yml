name: 'Agent Governance Verify'
description: 'Run governance verification and plugin validation from the Agent Governance Toolkit'
author: 'Microsoft'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  command:
    description: >
      Which verification to run.
      Options: governance-verify, marketplace-verify, policy-evaluate, all
    required: false
    default: 'governance-verify'
  policy-path:
    description: 'Path to a native ACS manifest for policy-evaluate'
    required: false
    default: ''
  intervention-point:
    description: 'ACS intervention point used by policy-evaluate'
    required: false
    default: 'pre_tool_call'
  manifest-path:
    description: 'Path to plugin manifest for marketplace-verify command'
    required: false
    default: ''
  context-json:
    description: 'JSON snapshot passed to the selected intervention point'
    required: false
    default: ''
  output-format:
    description: 'Output format: text, json, badge'
    required: false
    default: 'text'
  fail-on-warning:
    description: 'Fail the check if warnings are found (not just errors)'
    required: false
    default: 'false'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  toolkit-version:
    description: 'Exact Agent Governance Toolkit version to install (for example, 3.7.0)'
    required: true

outputs:
  status:
    description: 'Compliance status: pass or fail'
    value: ${{ steps.run.outputs.status }}
  controls-passed:
    description: 'Number of governance controls passed (governance-verify only)'
    value: ${{ steps.run.outputs.controls_passed }}
  controls-total:
    description: 'Total number of governance controls checked (governance-verify only)'
    value: ${{ steps.run.outputs.controls_total }}
  violations:
    description: 'Number of policy violations found (policy-evaluate only)'
    value: ${{ steps.run.outputs.violations }}
  output:
    description: 'Full command output (JSON when output-format is json)'
    value: ${{ steps.run.outputs.output }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Agent Governance Toolkit
      shell: bash
      env:
        AGT_TOOLKIT_VERSION: ${{ inputs.toolkit-version }}
      run: |
        if [ -z "$AGT_TOOLKIT_VERSION" ]; then
          echo "::error::toolkit-version must be set to an exact published version"
          exit 1
        fi
        # Enforce exact version (PEP 440-like). Only release / pre-release
        # forms are accepted: X.Y.Z, X.Y.ZaN, X.Y.ZbN, X.Y.ZrcN. Post-releases
        # (``.postN``), dev-releases (``.devN``), local-version identifiers
        # (``+local``) and URL/marker syntax are rejected so the install line
        # below cannot be coerced into resolving an unintended distribution.
        if ! printf '%s' "$AGT_TOOLKIT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$'; then
          echo "::error::toolkit-version must be an exact release or pre-release (e.g. 3.7.0 or 3.7.0rc1); got: $AGT_TOOLKIT_VERSION"
          exit 1
        fi
        python -m pip install --quiet --no-cache-dir --disable-pip-version-check "agent-governance-toolkit[full]==$AGT_TOOLKIT_VERSION"

    - name: Install OPA for native policy evaluation
      if: inputs.command == 'policy-evaluate' || inputs.command == 'all'
      shell: bash
      run: |
        set -euo pipefail
        curl --proto '=https' --tlsv1.2 -fSLo "$RUNNER_TEMP/opa" \
          --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 20 \
          "https://openpolicyagent.org/downloads/v0.70.0/opa_linux_amd64_static"
        echo "00d114b94fdb1606a48cccdfc73c9ccdc62c38721150131ae578d5ff3df5c084  $RUNNER_TEMP/opa" | sha256sum -c -
        chmod +x "$RUNNER_TEMP/opa"
        echo "ACS_OPA_PATH=$RUNNER_TEMP/opa" >> "$GITHUB_ENV"
        echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

    - name: Run governance check
      id: run
      shell: bash
      env:
        AGT_COMMAND: ${{ inputs.command }}
        AGT_FORMAT: ${{ inputs.output-format }}
        AGT_MANIFEST_PATH: ${{ inputs.manifest-path }}
        AGT_POLICY_PATH: ${{ inputs.policy-path }}
        AGT_INTERVENTION_POINT: ${{ inputs.intervention-point }}
        AGT_CONTEXT_JSON: ${{ inputs.context-json }}
      run: |
        set +e
        COMMAND="$AGT_COMMAND"
        FORMAT="$AGT_FORMAT"
        STATUS="pass"
        EXIT_CODE=0
        OUTPUT=""

        case "$COMMAND" in
          governance-verify)
            echo "🛡️ Running governance verification..."
            if [ "$FORMAT" = "json" ]; then
              OUTPUT=$(python -m agent_compliance.cli.main verify --json 2>&1)
            elif [ "$FORMAT" = "badge" ]; then
              OUTPUT=$(python -m agent_compliance.cli.main verify --badge 2>&1)
            else
              OUTPUT=$(python -m agent_compliance.cli.main verify 2>&1)
            fi
            EXIT_CODE=$?

            # Extract controls info from JSON output
            if [ "$FORMAT" = "json" ]; then
              PASSED=$(echo "$OUTPUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('controls_passed',0))" 2>/dev/null || echo "0")
              TOTAL=$(echo "$OUTPUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('controls_total',0))" 2>/dev/null || echo "0")
              echo "controls_passed=$PASSED" >> "$GITHUB_OUTPUT"
              echo "controls_total=$TOTAL" >> "$GITHUB_OUTPUT"
            fi
            ;;

          marketplace-verify)
            MANIFEST="$AGT_MANIFEST_PATH"
            if [ -z "$MANIFEST" ]; then
              echo "::error::manifest-path is required for marketplace-verify command"
              exit 1
            fi
            echo "📦 Verifying plugin manifest: $MANIFEST"
            OUTPUT=$(python -m agent_marketplace.cli_commands verify "$MANIFEST" 2>&1)
            EXIT_CODE=$?
            ;;

          policy-evaluate)
            POLICY="$AGT_POLICY_PATH"
            CONTEXT="$AGT_CONTEXT_JSON"
            if [ -z "$POLICY" ]; then
              echo "::error::policy-path is required for policy-evaluate command"
              exit 1
            fi
            echo "📋 Evaluating native manifest: $POLICY"
            OUTPUT=$(AGT_POLICY="$POLICY" AGT_CONTEXT="$CONTEXT" AGT_IP="$AGT_INTERVENTION_POINT" python -c "
        import json, sys, os

        from agt.policies import AgtRuntime

        ctx_raw = os.environ.get('AGT_CONTEXT', '')
        snapshot = json.loads(ctx_raw) if ctx_raw else {}
        runtime = AgtRuntime(os.environ['AGT_POLICY'])
        decision = runtime.evaluate(os.environ['AGT_IP'], snapshot)

        result = {
            'allowed': decision.is_allowed(),
            'verdict': decision.verdict,
            'reason_code': decision.reason_code,
            'message': decision.message,
        }
        print(json.dumps(result, indent=2))
        sys.exit(0 if decision.is_allowed() else 1)
        " 2>&1)
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "violations=1" >> "$GITHUB_OUTPUT"
            else
              echo "violations=0" >> "$GITHUB_OUTPUT"
            fi
            ;;

          all)
            echo "🛡️ Running full governance suite..."
            RESULTS=""
            FAIL=0

            # 1. Governance verify
            echo "--- Governance Verification ---"
            GV_OUT=$(python -m agent_compliance.cli.main verify --json 2>&1)
            GV_EXIT=$?
            echo "$GV_OUT"
            [ $GV_EXIT -ne 0 ] && FAIL=1

            # 2. Marketplace verify (if manifest provided)
            MANIFEST="$AGT_MANIFEST_PATH"
            if [ -n "$MANIFEST" ]; then
              echo "--- Marketplace Verification ---"
              MV_OUT=$(python -m agent_marketplace.cli_commands verify "$MANIFEST" 2>&1)
              MV_EXIT=$?
              echo "$MV_OUT"
              [ $MV_EXIT -ne 0 ] && FAIL=1
            fi

            # 3. Policy evaluate (if policy provided)
            POLICY="$AGT_POLICY_PATH"
            if [ -n "$POLICY" ]; then
              echo "--- Policy Evaluation ---"
              PE_OUT=$(AGT_POLICY="$POLICY" AGT_CONTEXT="$AGT_CONTEXT_JSON" AGT_IP="$AGT_INTERVENTION_POINT" python -c "
        import json, sys, os
        from agt.policies import AgtRuntime
        ctx_raw = os.environ.get('AGT_CONTEXT', '')
        snapshot = json.loads(ctx_raw) if ctx_raw else {}
        runtime = AgtRuntime(os.environ['AGT_POLICY'])
        decision = runtime.evaluate(os.environ['AGT_IP'], snapshot)
        print(json.dumps({'allowed': decision.is_allowed(), 'verdict': decision.verdict, 'reason_code': decision.reason_code, 'message': decision.message}, indent=2))
        sys.exit(0 if decision.is_allowed() else 1)
        " 2>&1)
              PE_EXIT=$?
              echo "$PE_OUT"
              [ $PE_EXIT -ne 0 ] && FAIL=1
            fi

            EXIT_CODE=$FAIL
            OUTPUT="Full suite completed. Exit: $EXIT_CODE"
            ;;

          *)
            echo "::error::Unknown command: $COMMAND. Use: governance-verify, marketplace-verify, policy-evaluate, or all"
            exit 1
            ;;
        esac

        # Set outputs
        if [ $EXIT_CODE -ne 0 ]; then
          STATUS="fail"
        fi
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"

        # Store output (handle multiline)
        {
          echo "output<<GOVEOF"
          echo "$OUTPUT"
          echo "GOVEOF"
        } >> "$GITHUB_OUTPUT"

        echo "$OUTPUT"

        # Determine final exit
        if [ "$STATUS" = "fail" ]; then
          echo "::error::Governance check failed"
          exit 1
        fi
