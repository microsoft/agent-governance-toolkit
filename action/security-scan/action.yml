name: 'Security Scan'
description: 'Scan for secrets, CVEs, and dangerous code patterns using Agent Governance Toolkit'
author: 'Microsoft'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  paths:
    description: 'Paths to scan (space-separated, e.g., "plugins/ scripts/")'
    required: true
  plugin-name:
    description: 'Plugin name for error messages'
    required: false
    default: ''
  exemptions-file:
    description: 'Path to .security-exemptions.json file'
    required: false
    default: '.security-exemptions.json'
  min-severity:
    description: 'Minimum severity to block merge (critical|high|medium|low)'
    required: false
    default: 'high'
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  toolkit-version:
    description: 'Exact Agent Governance Toolkit version to install (for example, 3.7.0)'
    required: true

outputs:
  status:
    description: 'Scan status: pass or fail'
    value: ${{ steps.scan.outputs.status }}
  findings-count:
    description: 'Total number of security findings'
    value: ${{ steps.scan.outputs.findings_count }}
  blocking-count:
    description: 'Number of blocking findings (critical/high)'
    value: ${{ steps.scan.outputs.blocking_count }}
  findings:
    description: 'Security findings in JSON format'
    value: ${{ steps.scan.outputs.findings }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Agent Governance Toolkit
      shell: bash
      env:
        AGT_TOOLKIT_VERSION: ${{ inputs.toolkit-version }}
      run: |
        if [ -z "$AGT_TOOLKIT_VERSION" ]; then
          echo "::error::toolkit-version must be set to an exact published version"
          exit 1
        fi
        # Enforce exact version (PEP 440-like). Only release / pre-release
        # forms are accepted: X.Y.Z, X.Y.ZaN, X.Y.ZbN, X.Y.ZrcN. Post / dev /
        # local-version syntax is rejected so the install line below cannot be
        # coerced into resolving an unintended distribution.
        if ! printf '%s' "$AGT_TOOLKIT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$'; then
          echo "::error::toolkit-version must be an exact release or pre-release (e.g. 3.7.0 or 3.7.0rc1); got: $AGT_TOOLKIT_VERSION"
          exit 1
        fi
        python -m pip install --quiet --no-cache-dir --disable-pip-version-check "agent-governance-toolkit[security]==$AGT_TOOLKIT_VERSION"

    - name: Run security scan
      id: scan
      shell: bash
      env:
        AGT_PATHS: ${{ inputs.paths }}
        AGT_PLUGIN_NAME: ${{ inputs.plugin-name }}
        AGT_VERBOSE: ${{ inputs.verbose }}
      run: |
        set +e
        
        # Run scanner for each path
        PLUGIN_NAME="$AGT_PLUGIN_NAME"
        VERBOSE_FLAG=""
        
        if [ "$AGT_VERBOSE" = "true" ]; then
          VERBOSE_FLAG="--verbose"
        fi
        
        # Use plugin name from first path if not provided
        if [ -z "$PLUGIN_NAME" ]; then
          PLUGIN_NAME=$(basename "$(echo "$AGT_PATHS" | awk '{print $1}')")
        fi
        
        # Run the security scanner
        AGT_PLUGIN="$PLUGIN_NAME" python -c "
        from pathlib import Path
        from agent_compliance.security import scan_plugin_security
        import json
        import sys
        import os

        paths = os.environ['AGT_PATHS'].split()
        verbose = os.environ.get('AGT_VERBOSE', '') == 'true'

        # Scan first path (primary plugin directory)
        plugin_dir = Path(paths[0])
        plugin_name = os.environ.get('AGT_PLUGIN', '')

        exit_code, error_msg = scan_plugin_security(
            plugin_dir=plugin_dir,
            plugin_name=plugin_name,
            verbose=verbose
        )

        # Output for GitHub Actions
        print(f'exit_code={exit_code}', file=sys.stderr)
        if error_msg:
            print(error_msg)

        sys.exit(exit_code)
        " 2>&1
        
        EXIT_CODE=$?
        
        # Set outputs
        if [ $EXIT_CODE -eq 0 ]; then
          echo "status=pass" >> "$GITHUB_OUTPUT"
        else
          echo "status=fail" >> "$GITHUB_OUTPUT"
        fi
        
        echo "findings_count=0" >> "$GITHUB_OUTPUT"
        echo "blocking_count=0" >> "$GITHUB_OUTPUT"
        
        # Fail if blocking issues found
        if [ $EXIT_CODE -ne 0 ]; then
          echo "::error::Security scan failed"
          exit 1
        fi
        
        echo "::notice::Security scan passed - no blocking issues found"
