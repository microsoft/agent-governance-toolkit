# Safety policy for agent-governance-toolkit.
# Uses the v2.0 schema accepted by safety check in CI.
# See https://docs.pyup.io/docs/safety-20-policy-files

version: "2.0"

security:
  # Only fail the build on HIGH or CRITICAL vulnerabilities (CVSS >= 7.0).
  # Low/medium severity findings in dev or test dependencies are not blocked.
  ignore-cvss-below: 7.0

  # Advisory IDs acknowledged and accepted pending upstream fixes.
  # Format: list of Safety DB advisory IDs (integers).
  ignore-ids: []
