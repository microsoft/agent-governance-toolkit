[build-system]
requires = ["setuptools>=68.0,<83.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent_primitives"
version = "3.2.0"
description = "Shared primitive data models for Agent OS - compatibility shim pointing to the top-level Python package home"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [
    { name = "Microsoft Corporation", email = "agentgovtoolkit@microsoft.com" }
]
keywords = [
    "agent",
    "ai",
    "llm",
    "primitives",
    "models",
    "failures",
    "multi-agent",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.4.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0,<8.0",
    "mypy>=1.8.0,<2.0",
    "ruff>=0.1.0,<1.0",
]

[project.urls]
Homepage = "https://github.com/microsoft/agent-governance-toolkit"
Repository = "https://github.com/microsoft/agent-governance-toolkit.git"
Issues = "https://github.com/microsoft/agent-governance-toolkit/issues"

[tool.setuptools]
package-dir = {"" = "../../../../agent-governance-python/agent-primitives"}
packages = ["agent_primitives"]
include-package-data = true

[tool.setuptools.package-data]
"*" = ["py.typed"]
