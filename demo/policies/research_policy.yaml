version: "1.0"
name: "research-agent-governance"
description: >
  Governance policy for the Research Agent in the governed research pipeline.
  Allows web search, blocks access to internal/secrets resources, and enforces
  token limits. All actions are audit-logged.

rules:
  - name: "block-internal-resources"
    condition:
      field: "message"
      operator: "contains"
      value: "internal"
    action: "deny"
    priority: 100
    message: "Access to internal resources is restricted by governance policy"

  - name: "block-system-paths"
    condition:
      field: "message"
      operator: "matches"
      value: "(/etc/|C:/Windows|system32|/root/)"
    action: "deny"
    priority: 150
    message: "Access to system files is restricted by security governance"

  - name: "block-env-access"
    condition:
      field: "message"
      operator: "contains"
      value: ".env"
    action: "deny"
    priority: 150
    message: "Environment variable files are strictly prohibited"

  - name: "allow-web-search"
    condition:
      field: "message"
      operator: "contains"
      value: "search"
    action: "allow"
    priority: 50
    message: "Web search is permitted for research agents"

  - name: "audit-all-actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All agent actions are audit-logged"

defaults:
  action: "allow"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
