#
# Contoso Bank: enterprise governance policy for a multi-agent
# loan-processing workflow. Covers tool-call restrictions,
# PII leak prevention, and cross-agent message inspection.

name: contoso-bank-policy
version: "1.0"

defaults:
  action: allow

rules:
  # --- Tool restrictions ---
  - name: block-destructive-ops
    condition:
      field: tool_name
      operator: in
      value: ["delete_file", "drop_table", "truncate_table", "shell_exec", "execute_code"]
    action: deny
    priority: 100
    message: "Destructive operations are prohibited in production"

  - name: block-unauthorized-transfers
    condition:
      field: tool_name
      operator: in
      value: ["transfer_funds", "wire_transfer", "approve_loan"]
    action: deny
    priority: 100
    message: "Financial operations require explicit capability grant"

  - name: block-credential-access
    condition:
      field: tool_name
      operator: in
      value: ["read_secrets", "export_keys", "credential_dump"]
    action: deny
    priority: 100
    message: "Credential access blocked by policy"

  # --- PII protection ---
  - name: block-ssn-in-messages
    condition:
      field: message_text
      operator: matches
      value: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    action: deny
    priority: 95
    message: "SSN detected in inter-agent message"

  - name: block-ssn-in-tool-input
    condition:
      field: input_text
      operator: matches
      value: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    action: deny
    priority: 95
    message: "SSN detected in tool input"

  # --- Exfiltration prevention ---
  - name: block-external-network
    condition:
      field: tool_name
      operator: in
      value: ["http_request", "send_email", "exfiltrate"]
    action: deny
    priority: 90
    message: "Outbound network calls require approval"

  # --- Dangerous code patterns ---
  - name: block-subprocess
    condition:
      field: code
      operator: contains
      value: "subprocess"
    action: deny
    priority: 100
    message: "Shell-out blocked by policy"

  - name: block-eval
    condition:
      field: code
      operator: contains
      value: "eval("
    action: deny
    priority: 100
    message: "Dynamic code execution blocked"

  - name: block-pip-install
    condition:
      field: code
      operator: contains
      value: "pip install"
    action: deny
    priority: 100
    message: "Ad-hoc dependency installs are not permitted"
