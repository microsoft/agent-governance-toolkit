# Cold Chain Policy — Wine Premium Shipment
#
# Cedar equivalent (production firmware):
#   forbid(principal, action == Action::"release_shipment", resource)
#   when { context.temperature_c > 18.0 };
#
#   forbid(principal, action == Action::"release_shipment", resource)
#   when { context.temperature_c < 10.0 };
#
#   forbid(principal, action == Action::"release_shipment", resource)
#   when { context.shock_g > 5.0 };

policy_id: cold-chain-wine-premium
description: >
  Ensures wine shipments remain within acceptable environmental parameters
  throughout the supply chain. Violations produce signed denial receipts
  that prove the boundary was checked and held.

rules:
  temperature:
    min_c: 10.0
    max_c: 18.0
    action_on_violation: deny

  shock:
    max_g: 5.0
    action_on_violation: alert

  light:
    max_lux: 1000.0
    action_on_violation: alert

  battery:
    min_pct: 10.0
    action_on_violation: alert

enforcement:
  mode: inline           # evaluated per-reading, not post-hoc
  signing: ed25519       # ATECC608B secure element
  chain_model: linear    # previousReceiptHash links
  offline_verifiable: true
