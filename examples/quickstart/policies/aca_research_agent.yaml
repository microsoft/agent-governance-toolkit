# Policy file referenced by the Step 5 walkthrough in
# docs/proposals/azure-aca-sandbox.md. As of AGT 3.3,
# network_allowlist, tool_allowlist, and the sandbox
# resource caps (max_cpu / max_memory_mb / timeout_seconds /
# network_default) are native PolicyDocument fields, so the
# whole policy can be expressed declaratively in YAML and
# loaded with PolicyDocument.from_yaml.
name: research-agent
version: "2"

defaults:
  action: allow
  max_cpu: 1.0
  max_memory_mb: 2048
  timeout_seconds: 90
  network_default: deny   # fail-closed (also the schema default)

network_allowlist:
  - api.openai.com
  - api.arxiv.org
  - export.arxiv.org
  - "*.github.com"
  - pypi.org
  - files.pythonhosted.org

tool_allowlist:
  - fetch_arxiv
  - fetch_github_readme
  - search_index

rules:
  - name: deny-shell-out-subprocess
    condition: { field: code, operator: contains, value: "subprocess" }
    action: deny
    priority: 100
    message: "shell-out blocked by research-agent policy"

  - name: deny-shell-out-os-system
    condition: { field: code, operator: contains, value: "os.system(" }
    action: deny
    priority: 100
    message: "shell-out blocked by research-agent policy"

  - name: deny-shell-out-pty
    condition: { field: code, operator: contains, value: "pty.spawn" }
    action: deny
    priority: 100
    message: "shell-out blocked by research-agent policy"

  - name: deny-shell-out-popen
    condition: { field: code, operator: contains, value: "popen(" }
    action: deny
    priority: 100
    message: "shell-out blocked by research-agent policy"

  - name: deny-pip-install
    condition: { field: code, operator: contains, value: "pip install" }
    action: deny
    priority: 100
    message: "ad-hoc dependency installs are not permitted"

  - name: deny-pip3-install
    condition: { field: code, operator: contains, value: "pip3 install" }
    action: deny
    priority: 100
    message: "ad-hoc dependency installs are not permitted"

  - name: deny-ensurepip
    condition: { field: code, operator: contains, value: "ensurepip" }
    action: deny
    priority: 100
    message: "ad-hoc dependency installs are not permitted"

  - name: deny-secret-azure
    condition: { field: code, operator: contains, value: "AZURE_CLIENT_SECRET" }
    action: deny
    priority: 100
    message: "agents may not read host credentials"

  - name: deny-secret-openai
    condition: { field: code, operator: contains, value: "OPENAI_API_KEY" }
    action: deny
    priority: 100
    message: "agents may not read host credentials"

  - name: deny-secret-ssh
    condition: { field: code, operator: contains, value: "/.ssh/" }
    action: deny
    priority: 100
    message: "agents may not read host credentials"

  - name: deny-secret-aws
    condition: { field: code, operator: contains, value: "/.aws/" }
    action: deny
    priority: 100
    message: "agents may not read host credentials"

  # Tool-allowlist gate. The evaluator short-circuits to False when
  # the context field is absent (see PolicyEvaluator._match_condition),
  # so callers that do NOT pass tool_name in the eval context are
  # unaffected -- only tool-tagged execute_code calls are gated.
  - name: deny-tool-not-in-allowlist
    condition:
      field: tool_name
      operator: not_in
      value: [fetch_arxiv, fetch_github_readme, search_index]
    action: deny
    priority: 200
    message: "tool not in research-agent tool_allowlist"
