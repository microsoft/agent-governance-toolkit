version: "1.0"
name: "contoso-devops-deploy-governance"
description: >
  Governance policy for DeployBot. Blocks direct production releases,
  destructive operations, and secret retrieval while allowing build, test,
  and staging workflows.

rules:
  - name: "block_production_deploy"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(production deploy|deploy.*production|production.*deploy|push to prod|release to production|ship to prod)'
    action: "deny"
    priority: 100
    message: "Production deployments require human approval gates"

  - name: "block_destructive_ops"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(drop database|force push|rm -rf|delete resource group|truncate table|drop table)'
    action: "deny"
    priority: 95
    message: "Destructive operations are prohibited by deployment safety policy"

  - name: "block_secret_access"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(production secret|connection string|api key|certificate|prod credential)'
    action: "deny"
    priority: 90
    message: "Production secrets and credentials are isolated from the agent"

  - name: "allow_staging_deploy"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(staging|deploy to dev|deploy to test|staging deploy)'
    action: "allow"
    priority: 50
    message: "Non-production deployments are permitted"

  - name: "allow_pipeline_ops"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(pipeline status|build status|trigger build|view logs|run tests|check pipeline)'
    action: "allow"
    priority: 45
    message: "Pipeline inspection and build/test workflows are permitted"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All deployment assistant activity is audit logged"

defaults:
  action: "allow"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
