version: "1.0"
name: "securedesk-helpdesk-governance"
description: >
  Governance policy for the SecureDesk IT helpdesk agent. Blocks credential
  access, privilege escalation, and infrastructure changes while allowing
  normal ticket and self-service operations.

rules:
  - name: "block_credential_access"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(password|api key|token|secret|credential vault|credential store)'
    action: "deny"
    priority: 100
    message: "Credentials and secret stores are restricted by security policy"

  - name: "block_privilege_escalation"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(sudo|domain admins|elevated privileges|runas|net user|chmod 777|chown root)'
    action: "deny"
    priority: 95
    message: "Privilege escalation requests are prohibited"

  - name: "block_infrastructure_changes"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(firewall rule|dns modification|active directory|modify firewall|change dns)'
    action: "deny"
    priority: 90
    message: "Infrastructure changes require authorized operations staff"

  - name: "allow_knowledge_base"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(knowledge base|kb article|troubleshooting|search knowledge|how to)'
    action: "allow"
    priority: 55
    message: "Knowledge-base searches are permitted"

  - name: "allow_ticket_operations"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(create ticket|ticket status|password reset|vpn|laptop|helpdesk)'
    action: "allow"
    priority: 50
    message: "Standard helpdesk actions are permitted"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All helpdesk activity is audit logged"

defaults:
  action: "allow"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
