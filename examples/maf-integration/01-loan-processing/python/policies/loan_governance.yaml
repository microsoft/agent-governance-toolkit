version: "1.0"
name: "contoso-bank-loan-governance"
description: >
  Governance policy for the Contoso Bank loan assistant. Blocks PII disclosure,
  high-value approvals, and internal transfer workflows while allowing normal
  loan inquiry activity.

rules:
  - name: "block_pii_access"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(\b\d{3}-\d{2}-\d{4}\b|social security|ssn|tax records|tax returns|personal identifier)'
    action: "deny"
    priority: 100
    message: "Access to SSN and tax record content is prohibited by banking PII policy"

  - name: "block_high_value_approval"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(approve.*loan|loan approval|\$\s*(?:[5-9]\d{4,}|[1-9]\d{5,}))'
    action: "deny"
    priority: 95
    message: "Loan approvals above the delegated threshold require human review"

  - name: "block_internal_transfers"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(transfer funds|wire transfer|internal transfer|admin tool|internal_api)'
    action: "deny"
    priority: 90
    message: "Transfers and internal bank operations are restricted to approved workflows"

  - name: "allow_loan_inquiries"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(loan|mortgage|credit|rate|eligibility|pre-qualif)'
    action: "allow"
    priority: 50
    message: "Standard loan inquiry operations are permitted"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All loan-assistant activity is audit logged"

defaults:
  action: "allow"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
