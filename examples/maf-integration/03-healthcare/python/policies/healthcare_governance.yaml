version: "1.0"
name: "medassist-healthcare-governance"
description: >
  Governance policy for the MedAssist clinical assistant. Blocks PHI disclosure,
  controlled-substance workflows, and cross-department record access while
  allowing normal clinical guidance and de-identified summaries.

rules:
  - name: "block_phi_access"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(\b\d{3}-\d{2}-\d{4}\b|insurance id|medical record|mrn|date of birth|\bdob\b|birth date)'
    action: "deny"
    priority: 100
    message: "Direct PHI and PII disclosure is prohibited by HIPAA policy"

  - name: "prescription_safety"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(oxycodone|fentanyl|morphine|hydrocodone|schedule ii|schedule iii|schedule iv|controlled substance|80mg|100mg|200mg)'
    action: "deny"
    priority: 95
    message: "Controlled substances and unsafe dosages require physician override"

  - name: "block_cross_department"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(radiology records|billing records|hr records|payroll|financial records)'
    action: "deny"
    priority: 90
    message: "Cross-department record access requires separate authorization"

  - name: "allow_clinical_queries"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(symptom|drug interaction|interaction|treatment|treatment guideline|diagnosis|clinical|diabetes|warfarin|aspirin)'
    action: "allow"
    priority: 50
    message: "Clinical guidance queries are permitted"

  - name: "allow_patient_summary"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(de-identified|anonymized|aggregate data|patient summary)'
    action: "allow"
    priority: 45
    message: "De-identified summaries and aggregate views are permitted"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All clinical assistant activity is audit logged"

defaults:
  action: "allow"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
