version: "1.0"
name: "support-agent-governance"
description: >
  Governance policy for the Contoso Support agent. Blocks payment-card disclosure,
  high-value refunds, and direct billing changes while allowing standard customer
  support and escalation flows.

rules:
  - name: "block_pii_access"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(credit card|card number|cvv|payment details|account number)'
    action: "deny"
    priority: 100
    message: "Payment card details and customer financial identifiers cannot be exposed"

  - name: "refund_limit"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(refund.*\$\s*(?:[5-9]\d{2}|[1-9]\d{3,}))'
    action: "deny"
    priority: 95
    message: "Refunds above $500 require human manager approval"

  - name: "block_account_modification"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(modify account|change billing|update payment method|modify billing)'
    action: "deny"
    priority: 90
    message: "Direct account billing modifications are not permitted"

  - name: "allow_escalation"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(escalate|manager|supervisor|human agent)'
    action: "allow"
    priority: 80
    message: "Escalation to a human manager is permitted"

  - name: "allow_support_inquiries"
    condition:
      field: "message"
      operator: "matches"
      value: '(?i)(order|status|lookup|track|return|support|refund)'
    action: "allow"
    priority: 50
    message: "Standard support inquiries are permitted"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All support activity is audit logged"

defaults:
  action: "allow"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
