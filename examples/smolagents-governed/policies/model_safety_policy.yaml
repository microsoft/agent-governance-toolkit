# Model Safety — Governance Policy
#
# IMPORTANT: This is a SAMPLE configuration provided as a starting point.
# You MUST review, customize, and extend these rules for your specific
# use case before deploying to production. Microsoft does not guarantee
# that these rules are comprehensive or sufficient for your security
# requirements.

version: "1.0"
name: "model-safety-governance"
description: >
  Model safety policy for smolagents workflows.  Blocks untrusted
  model downloads, restricts inference to approved models, and
  enforces data access controls for HF pipeline outputs.

disclaimer: >
  This is a sample configuration. It is NOT exhaustive and should be
  customized for your specific security requirements.

rules:
  # ── Model Trust ─────────────────────────────────────────────────────────
  - name: "block-unverified-publish"
    condition:
      field: "message"
      operator: "contains"
      value: "publish without review"
    action: "deny"
    priority: 200
    message: "Model outputs must be reviewed before publishing"

  - name: "block-draft-results"
    condition:
      field: "message"
      operator: "contains"
      value: "DRAFT"
    action: "deny"
    priority: 180
    message: "Draft results cannot be published — requires human review"

  # ── Inference Safety ────────────────────────────────────────────────────
  - name: "block-profanity"
    condition:
      field: "message"
      operator: "matches"
      value: '\b(placeholder_profanity_pattern)\b'
    action: "deny"
    priority: 190
    message: "Content contains prohibited language"

  # ── Approved Content ────────────────────────────────────────────────────
  - name: "allow-reviewed-content"
    condition:
      field: "message"
      operator: "contains"
      value: "REVIEWED"
    action: "allow"
    priority: 100
    message: "Content has been reviewed and is cleared for use"

  # ── Audit Everything ────────────────────────────────────────────────────
  - name: "audit-all-model-actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All model safety actions are audit-logged"

defaults:
  action: "allow"
  max_tokens: 8192
  max_tool_calls: 5
  confidence_threshold: 0.9
