# Pre-commit hooks for Agent Governance Toolkit.
# Add this repo as a pre-commit hook source:
#
#   repos:
#     - repo: https://github.com/microsoft/agent-governance-toolkit
#       rev: main
#       hooks:
#         - id: validate-policy
#         - id: validate-plugin-manifest
#         - id: evaluate-plugin-policy
#           args: ['--manifest', 'policies/marketplace-manifest.yaml']
#
- id: validate-policy
  name: Validate native ACS manifests
  description: Requires the AGT development environment or installed CLI
  language: system
  entry: agt lint-policy
  files: '(^|/)(manifest|.*polic.*)\.(yaml|yml|json)$'
  types_or: [yaml, json]

- id: validate-plugin-manifest
  name: Validate plugin manifest schema
  description: Validates plugin manifests (plugin.json) for required fields and schema compliance
  language: system
  entry: python -m agent_marketplace.hooks validate-manifest
  files: '(^|/)plugin\.(json|yaml|yml)$'
  types_or: [json, yaml]

- id: evaluate-plugin-policy
  name: Evaluate plugin against native governance
  description: Evaluates plugin manifests against a native ACS manifest
  language: system
  entry: python -m agent_marketplace.hooks evaluate-governance
  files: '(^|/)plugin\.(json|yaml|yml)$'
  types_or: [json, yaml]
