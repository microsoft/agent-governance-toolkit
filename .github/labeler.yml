"ci/cd":
  - changed-files:
      - any-glob-to-any-file: ".github/**"
"documentation":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "**/*.md"
"security":
  - changed-files:
      - any-glob-to-any-file:
          - "SECURITY.md"
          - "**/security/**"
"dependencies":
