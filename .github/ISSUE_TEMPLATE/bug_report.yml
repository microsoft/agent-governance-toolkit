name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the information below.
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - agent-os-kernel
        - agent-mesh
        - agent-hypervisor
        - agent-sre
        - agent-governance
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Microsoft Open Source Code of Conduct
          required: true
