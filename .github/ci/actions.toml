# Pinned GitHub Actions registry for the CI workflow generator.
#
# Every action referenced by a generated workflow MUST resolve to an entry here.
# Each entry pins a full commit SHA plus a human readable version comment, which
# is the repository convention enforced across .github/workflows. The generator
# fails closed when a workflow references an action key that is missing here or
# when an entry is not pinned to a 40 character SHA.

[checkout]
uses = "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
comment = "v7.0.0"

[setup-python]
uses = "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1"
comment = "v6.3.0"

[setup-node]
uses = "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e"
comment = "v6.4.0"

[setup-dotnet]
uses = "actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1"
comment = "v5.4.0"

[rust-toolchain]
uses = "dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8"
comment = "stable"
