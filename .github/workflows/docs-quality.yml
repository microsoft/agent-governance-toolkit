name: Docs Quality

# Runs link validation and frontmatter checks on PRs that touch the
# documentation site or its quality tooling.
#
# Link checking is strict: any broken relative link, missing target, or
# unresolved anchor fails the job. The baseline file is empty and reserved
# only for an explicitly approved migration.
#
# Frontmatter checking is strict because the published docs corpus has
# complete title, ownership, and review-date metadata.

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - 'mkdocs.yml'
      - 'scripts/docs/**'
      - 'scripts/tests/test_docs_check_*.py'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

jobs:
  links:
    name: Validate relative links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Run link checker
        run: python scripts/docs/check_links.py --root .

  frontmatter:
    name: Validate docs frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Run frontmatter checker
        run: python scripts/docs/check_frontmatter.py --root . --strict

  unit-tests:
    name: Unit tests for docs tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install pytest
        run: |
          pip install --no-cache-dir --require-hashes --no-deps \
            -r agent-governance-python/requirements/ci-docs-test.txt
          pip install --no-cache-dir pytest==8.3.3  # Scorecard: version-pinned (transitive deps)
      - name: Run docs tooling tests
        run: pytest scripts/tests/test_docs_check_links.py scripts/tests/test_docs_check_frontmatter.py -q
