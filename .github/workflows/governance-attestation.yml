name: Governance Attestation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  attestation:
    name: Validate PR governance attestation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Dogfood the governance-attestation composite action against this repo's
      # own PRs. The PR body is passed as an input (read via env inside the
      # action) so it is never interpolated into a shell command.
      - name: Validate governance attestation checklist
        uses: ./action/governance-attestation
        with:
          pr-body: ${{ github.event.pull_request.body }}
          toolkit-version: 4.1.0
