name: Supply Chain Check

on:
  pull_request:
    paths:
      - '**/package.json'
      - '**/Cargo.toml'
      - '**/pyproject.toml'
      - '**/requirements*.txt'

permissions:
  contents: read

jobs:
  check-version-pinning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check for unpinned npm versions
        run: |
          echo "Checking for ^ or ~ version ranges in package.json files..."
          VIOLATIONS=0
          while IFS= read -r f; do
            # Exclude engines block (VS Code extensions require ^ ranges for engine compat)
            if python3 -c "
          import json, sys
          data = json.load(open('$f'))
          for section in ('dependencies', 'devDependencies', 'peerDependencies'):
              for pkg, ver in data.get(section, {}).items():
                  if any(ver.startswith(c) for c in ('^', '~')):
                      print(f'    \"{pkg}\": \"{ver}\"')
                      sys.exit(1)
          " 2>/dev/null; then
              :
            else
              if [ $? -eq 1 ]; then
                echo "VIOLATION: $f has unpinned version ranges"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done < <(find packages -name package.json -not -path '*/node_modules/*' -not -path '*/dist/*')
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "Found $VIOLATIONS package.json files with ^ or ~ version ranges."
            echo "Pin to exact versions (e.g., \"1.2.3\" not \"^1.2.3\")."
            exit 1
          fi
          echo "OK: All package.json files use exact versions"

      - name: Check lockfile presence
        run: |
          echo "Checking for lockfiles..."
          while IFS= read -r f; do
            DIR=$(dirname "$f")
            if [ ! -f "$DIR/package-lock.json" ] && [ ! -f "$DIR/pnpm-lock.yaml" ] && [ ! -f "$DIR/yarn.lock" ]; then
              # Only flag if there are actual dependencies (not just name+version)
              if grep -q '"dependencies"' "$f" 2>/dev/null; then
                echo "WARNING: $DIR has dependencies but no lockfile"
              fi
            fi
          done < <(find packages -name package.json -not -path '*/node_modules/*' -not -path '*/dist/*')
          echo "Lockfile check complete"

  dependency-scorecard:
    name: OSSF Scorecard on new direct dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # Scorecard "Token-Permissions" / "Pinned-Dependencies" hardening:
          # don't leave the repo's GITHUB_TOKEN authenticated in the
          # worktree's git config after checkout. The job only needs
          # read-only access to history (already covered by contents:read).
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Run dependency Scorecard check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Org-level override hook: maintainers can extend the hard-coded
          # skip list (in scripts/check_dependency_scorecard.py) without
          # editing the script call. Format: whitespace-separated regexes.
          # Useful for private scoped packages that 404 on public registries
          # (e.g. ^@myorg/ for org-internal npm packages).
          EXTRA_SKIP_PATTERNS: ${{ vars.SCORECARD_EXTRA_SKIP_PATTERNS }}
        run: |
          set -euo pipefail
          # Defense-in-depth: GitHub disallows branch names starting with '-'
          # today, but pin the contract here so a future policy change cannot
          # turn this into a `git fetch --upload-pack=...` style injection.
          if ! [[ "$BASE_REF" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "$BASE_REF" == -* ]]; then
            echo "::error::refusing unsafe BASE_REF: $BASE_REF"; exit 1
          fi
          git fetch --no-tags --depth=50 origin -- "$BASE_REF"
          # Build skip-pattern args from the optional org override. Each
          # token becomes its own --skip-pattern so the script's own regex
          # validation runs over each value individually.
          extra_args=()
          if [[ -n "${EXTRA_SKIP_PATTERNS:-}" ]]; then
            for pat in $EXTRA_SKIP_PATTERNS; do
              extra_args+=(--skip-pattern "$pat")
            done
          fi
          python scripts/check_dependency_scorecard.py \
            --base-ref "origin/${BASE_REF}" \
            --head-ref "${HEAD_SHA}" \
            --min-score 5.0 \
            --max-deps 50 \
            "${extra_args[@]}"

