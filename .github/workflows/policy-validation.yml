name: Policy Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      policies: ${{ steps.filter.outputs.policies }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            policies:
              - '**/*.yaml'
              - '**/*.yml'
              - 'agent-governance-python/agt-policies/**'
              - 'agent-governance-python/agent-compliance/src/agent_compliance/lint_policy.py'

  validate-policies:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.policies == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install native manifest linter
        run: |
          pip install --no-cache-dir -e agent-governance-python/agent-compliance
          pip install --no-cache-dir --no-deps -e agent-governance-python/agt-policies

      - name: Find and validate native ACS manifests
        run: |
          python - <<'PY'
          from pathlib import Path
          from agent_compliance.lint_policy import lint_file

          manifests = []
          for root in (Path("examples"), Path("agent-governance-python")):
              for pattern in ("*.yaml", "*.yml"):
                  for path in root.rglob(pattern):
                      text = path.read_text(encoding="utf-8", errors="ignore")
                      if "agent_control_specification_version:" in text:
                          manifests.append(path)

          failed = []
          for path in sorted(manifests):
              result = lint_file(path)
              if not result.passed:
                  failed.extend(result.errors)

          print(f"Validated {len(manifests)} native ACS manifests.")
          for finding in failed:
              print(finding)
          raise SystemExit(bool(failed))
          PY

  test-policies:
    runs-on: ubuntu-latest
    needs: [changes, validate-policies]
    if: always() && needs.validate-policies.result != 'failure'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.policies == 'true'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.policies == 'true'
        with:
          python-version: "3.11"

      - name: Install native manifest test dependencies
        if: needs.changes.outputs.policies == 'true'
        run: |
          pip install --no-cache-dir -e agent-governance-python/agent-compliance
          pip install --no-cache-dir --no-deps -e agent-governance-python/agt-policies
          pip install --no-cache-dir --require-hashes -r "$GITHUB_WORKSPACE/agent-governance-python/requirements/ci-policy-test.txt"

      - name: Run native manifest lint tests
        if: needs.changes.outputs.policies == 'true'
        working-directory: agent-governance-python/agent-compliance
        run: pytest tests/test_lint_policy.py tests/test_agt_cli.py -k lint -v --tb=short

      - name: Skip (no policy changes)
        if: needs.changes.outputs.policies != 'true'
        run: echo "No policy file changes detected, skipping."
