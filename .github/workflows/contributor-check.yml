name: Contributor Reputation Check

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    # Skip bot accounts and trusted contributors
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: scripts

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Determine author
        id: author
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            echo "username=${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "type=pr" >> "$GITHUB_OUTPUT"
          else
            echo "username=${{ github.event.issue.user.login }}" >> "$GITHUB_OUTPUT"
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "type=issue" >> "$GITHUB_OUTPUT"
          fi

      - name: Run contributor check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python scripts/contributor_check.py \
            --username "${{ steps.author.outputs.username }}" \
            --json > /tmp/report.json
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          # Extract risk level
          risk=$(python -c "import json; print(json.load(open('/tmp/report.json'))['risk'])")
          echo "risk=$risk" >> "$GITHUB_OUTPUT"
          cat /tmp/report.json
          set -e

      - name: Comment on HIGH risk
        if: steps.check.outputs.risk == 'HIGH'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          username="${{ steps.author.outputs.username }}"
          number="${{ steps.author.outputs.number }}"
          type="${{ steps.author.outputs.type }}"

          body="<!-- spray-detect -->
          > **Contributor Reputation Check**: This $type was opened by \`$username\`, whose account shows signals that may warrant additional review before merging.
          >
          > Maintainers: please review the contributor's profile and contribution history.
          > This is an automated check, not a judgement. See [AGT claw defense docs](https://github.com/microsoft/agent-governance-toolkit/tree/main/scripts#contributor-reputation-tools) for details."

          if [ "$type" = "pr" ]; then
            gh pr comment "$number" --body "$body"
          else
            gh issue comment "$number" --body "$body"
          fi

      - name: Add label on MEDIUM or HIGH risk
        if: steps.check.outputs.risk == 'MEDIUM' || steps.check.outputs.risk == 'HIGH'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          number="${{ steps.author.outputs.number }}"
          type="${{ steps.author.outputs.type }}"
          risk="${{ steps.check.outputs.risk }}"

          # Create label if it doesn't exist
          gh label create "needs-review:$risk" \
            --description "Contributor reputation check flagged $risk risk" \
            --color "FFA500" \
            --force 2>/dev/null || true

          if [ "$type" = "pr" ]; then
            gh pr edit "$number" --add-label "needs-review:$risk"
          else
            gh issue edit "$number" --add-label "needs-review:$risk"
          fi
